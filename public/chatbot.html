<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chatbot Financiero - ADATEC</title>
  <style>
    :root {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --bg-card: #1e293b;
      --border: #334155;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --accent-blue: #3b82f6;
      --accent-cyan: #06b6d4;
      --accent-green: #10b981;
      --accent-red: #ef4444;
      --radius: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
    }

    .login-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .login-box {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3);
    }

    .login-box h1 {
      font-size: 24px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .login-box p {
      color: var(--text-secondary);
      margin-bottom: 24px;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 12px;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      border-color: var(--accent-blue);
    }

    .btn {
      width: 100%;
      padding: 12px;
      background: var(--accent-blue);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .error-msg {
      color: var(--accent-red);
      font-size: 13px;
      margin-top: 12px;
      display: none;
    }

    .chat-container {
      display: none;
      height: 100vh;
      flex-direction: column;
    }

    .chat-header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .chat-header h1 {
      font-size: 18px;
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header-info {
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .header-info span {
      font-size: 13px;
      color: var(--text-muted);
    }

    .logout-btn {
      padding: 6px 16px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }

    .logout-btn:hover {
      border-color: var(--accent-red);
      color: var(--accent-red);
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      align-self: flex-end;
      background: var(--accent-blue);
      color: white;
    }

    .message.assistant {
      align-self: flex-start;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
    }

    .message.system {
      align-self: center;
      background: transparent;
      color: var(--text-muted);
      font-size: 12px;
      text-align: center;
    }

    .message pre {
      background: var(--bg-primary);
      padding: 12px;
      border-radius: 8px;
      overflow-x: auto;
      margin-top: 8px;
      font-size: 13px;
    }

    .message code {
      font-family: 'Consolas', monospace;
    }

    .typing-indicator {
      display: none;
      align-self: flex-start;
      padding: 12px 16px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
    }

    .typing-indicator span {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: var(--text-muted);
      border-radius: 50%;
      margin-right: 4px;
      animation: bounce 1.4s infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-8px); }
    }

    .chat-input-container {
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
      padding: 16px 24px;
    }

    .chat-input-wrapper {
      display: flex;
      gap: 12px;
      max-width: 900px;
      margin: 0 auto;
    }

    .chat-input {
      flex: 1;
      padding: 12px 16px;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .chat-input:focus {
      border-color: var(--accent-blue);
    }

    .send-btn {
      padding: 12px 24px;
      background: var(--accent-blue);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .send-btn:hover { opacity: 0.9; }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .quick-questions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
      max-width: 900px;
      margin-left: auto;
      margin-right: auto;
    }

    .quick-btn {
      padding: 6px 12px;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .quick-btn:hover {
      border-color: var(--accent-blue);
      color: var(--accent-blue);
    }

    .chat-messages::-webkit-scrollbar { width: 6px; }
    .chat-messages::-webkit-scrollbar-track { background: var(--bg-primary); }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>
  <div class="login-container" id="loginContainer">
    <div class="login-box">
      <h1>Chatbot Financiero</h1>
      <p>Accede al asistente de análisis de cartera ADATEC</p>
      <form id="loginForm">
        <div class="form-group">
          <label>Usuario</label>
          <input type="text" id="username" required autocomplete="username">
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" id="password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn" id="loginBtn">Iniciar Sesión</button>
        <div class="error-msg" id="errorMsg">Credenciales inválidas</div>
      </form>
    </div>
  </div>

  <div class="chat-container" id="chatContainer">
    <div class="chat-header">
      <h1>Asistente Financiero ADATEC</h1>
      <div class="header-info">
        <span id="userDisplay"></span>
        <button class="logout-btn" id="logoutBtn">Cerrar Sesión</button>
      </div>
    </div>
    <div class="chat-messages" id="chatMessages">
      <div class="message system">
        Bienvenido al asistente financiero de ADATEC. Pregúntame sobre la cartera, clientes, recaudos o cualquier análisis financiero.
      </div>
    </div>
    <div class="typing-indicator" id="typingIndicator">
      <span></span><span></span><span></span>
    </div>
    <div class="chat-input-container">
      <div class="chat-input-wrapper">
        <input type="text" class="chat-input" id="chatInput" placeholder="Escribe tu pregunta..." autocomplete="off">
        <button class="send-btn" id="sendBtn">Enviar</button>
      </div>
      <div class="quick-questions">
        <button class="quick-btn" data-q="¿Cuál es el estado actual de la cartera?">Estado cartera</button>
        <button class="quick-btn" data-q="¿Quiénes son los principales deudores?">Top deudores</button>
        <button class="quick-btn" data-q="¿Cuál es la eficiencia de recaudo?">Eficiencia recaudo</button>
        <button class="quick-btn" data-q="¿Qué riesgos identifica en la cartera?">Riesgos</button>
        <button class="quick-btn" data-q="Analiza la tendencia de facturación vs recaudo">Tendencias</button>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = '';
    
    let sessionId = localStorage.getItem('sessionId');
    let conversationHistory = [];

    const loginContainer = document.getElementById('loginContainer');
    const chatContainer = document.getElementById('chatContainer');
    const loginForm = document.getElementById('loginForm');
    const errorMsg = document.getElementById('errorMsg');
    const chatMessages = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');
    const typingIndicator = document.getElementById('typingIndicator');

    async function verifySession() {
      if (!sessionId) return false;
      
      try {
        const resp = await fetch(`${API_BASE}/api/verify`, {
          headers: { 'X-Session-Id': sessionId }
        });
        const data = await resp.json();
        return data.authenticated;
      } catch {
        return false;
      }
    }

    function showChat(username) {
      loginContainer.style.display = 'none';
      chatContainer.style.display = 'flex';
      document.getElementById('userDisplay').textContent = `Usuario: ${username}`;
      chatInput.focus();
    }

    function showLogin() {
      loginContainer.style.display = 'flex';
      chatContainer.style.display = 'none';
      sessionId = null;
      localStorage.removeItem('sessionId');
      conversationHistory = [];
    }

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const loginBtn = document.getElementById('loginBtn');
      
      loginBtn.disabled = true;
      errorMsg.style.display = 'none';
      
      try {
        const resp = await fetch(`${API_BASE}/api/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        
        const data = await resp.json();
        
        if (data.success) {
          sessionId = data.sessionId;
          localStorage.setItem('sessionId', sessionId);
          showChat(username);
        } else {
          errorMsg.style.display = 'block';
        }
      } catch (err) {
        errorMsg.textContent = 'Error de conexión';
        errorMsg.style.display = 'block';
      } finally {
        loginBtn.disabled = false;
      }
    });

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      if (sessionId) {
        await fetch(`${API_BASE}/api/logout`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sessionId })
        });
      }
      showLogin();
    });

    function addMessage(content, type) {
      const msg = document.createElement('div');
      msg.className = `message ${type}`;
      msg.innerHTML = formatMessage(content);
      chatMessages.appendChild(msg);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function formatMessage(text) {
      return text
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\n/g, '<br>')
        .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
    }

    async function sendMessage(message) {
      if (!message.trim() || !sessionId) return;
      
      addMessage(message, 'user');
      conversationHistory.push({ role: 'user', content: message });
      
      chatInput.value = '';
      sendBtn.disabled = true;
      typingIndicator.style.display = 'block';
      chatMessages.scrollTop = chatMessages.scrollHeight;
      
      try {
        const resp = await fetch(`${API_BASE}/api/chat`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-Session-Id': sessionId
          },
          body: JSON.stringify({
            sessionId,
            message,
            conversationHistory
          })
        });
        
        const data = await resp.json();
        
        if (data.success) {
          addMessage(data.response, 'assistant');
          conversationHistory.push({ role: 'assistant', content: data.response });
        } else {
          addMessage('Error: ' + (data.error || 'Respuesta inválida'), 'system');
        }
      } catch (err) {
        addMessage('Error de conexión con el servidor', 'system');
      } finally {
        sendBtn.disabled = false;
        typingIndicator.style.display = 'none';
        chatInput.focus();
      }
    }

    sendBtn.addEventListener('click', () => sendMessage(chatInput.value));
    
    chatInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage(chatInput.value);
    });

    document.querySelectorAll('.quick-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        sendMessage(btn.dataset.q);
      });
    });

    (async () => {
      if (await verifySession()) {
        showChat('naprolab');
      }
    })();
  </script>
</body>
</html>
