<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chatbot Financiero - ADATEC</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
  <style>
    :root {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --bg-card: #1e293b;
      --border: #334155;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --accent-blue: #3b82f6;
      --accent-cyan: #06b6d4;
      --accent-green: #10b981;
      --accent-red: #ef4444;
      --radius: 12px;
    }
    [data-theme="light"] {
      --bg-primary: #f8fafc; --bg-secondary: #ffffff; --bg-card: #ffffff;
      --border: #e2e8f0; --text-primary: #0f172a; --text-secondary: #475569; --text-muted: #94a3b8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
    }

    .chat-container {
      height: 100vh;
      flex-direction: column;
    }

    .chat-header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .chat-header h1 {
      font-size: 18px;
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header-info {
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .header-info span {
      font-size: 13px;
      color: var(--text-muted);
    }

    .back-btn {
      padding: 6px 16px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
      text-decoration: none;
    }

    .back-btn:hover {
      border-color: var(--accent-blue);
      color: var(--accent-blue);
    }

    .export-btn {
      padding: 6px 12px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
    }
    .export-btn:hover { border-color: var(--accent-cyan); color: var(--accent-cyan); }
    .export-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .theme-toggle {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      padding: 5px 10px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 12px;
    }

    .warning-badge {
      display: inline-block;
      background: rgba(245,158,11,0.15);
      color: #f59e0b;
      border: 1px solid rgba(245,158,11,0.3);
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 11px;
      margin-top: 6px;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      align-self: flex-end;
      background: var(--accent-blue);
      color: white;
    }

    .message.assistant {
      align-self: flex-start;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
    }

    .message.system {
      align-self: center;
      background: transparent;
      color: var(--text-muted);
      font-size: 12px;
      text-align: center;
    }

    .typing-indicator {
      display: none;
      align-self: flex-start;
      padding: 12px 16px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
    }

    .typing-indicator span {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: var(--text-muted);
      border-radius: 50%;
      margin-right: 4px;
      animation: bounce 1.4s infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-8px); }
    }

    .chat-input-container {
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
      padding: 16px 24px;
    }

    .chat-input-wrapper {
      display: flex;
      gap: 12px;
      max-width: 900px;
      margin: 0 auto;
    }

    .chat-input {
      flex: 1;
      padding: 12px 16px;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .chat-input:focus {
      border-color: var(--accent-blue);
    }

    .send-btn {
      padding: 12px 24px;
      background: var(--accent-blue);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .send-btn:hover { opacity: 0.9; }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .quick-questions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
      max-width: 900px;
      margin-left: auto;
      margin-right: auto;
    }

    .quick-btn {
      padding: 6px 12px;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .quick-btn:hover {
      border-color: var(--accent-blue);
      color: var(--accent-blue);
    }

    .chat-messages::-webkit-scrollbar { width: 6px; }
    .chat-messages::-webkit-scrollbar-track { background: var(--bg-primary); }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <h1>Asistente Financiero ADATEC</h1>
      <div class="header-info">
        <span id="userDisplay"></span>
        <button class="export-btn" id="exportPdf" title="Exportar como PDF">📋 PDF</button>
        <button class="export-btn" id="exportDocx" title="Exportar como Word">📝 Word</button>
        <button class="export-btn" id="exportPptx" title="Exportar como PowerPoint">📑 PPT</button>
        <button class="theme-toggle" id="themeToggle">🌙 Oscuro</button>
        <a href="index.html" class="back-btn">← Dashboard</a>
      </div>
    </div>
    <div class="chat-messages" id="chatMessages">
      <div class="message system">
        Bienvenido al asistente financiero de ADATEC. Pregúntame sobre la cartera, clientes, recaudos o cualquier análisis financiero.
      </div>
    </div>
    <div class="typing-indicator" id="typingIndicator">
      <span></span><span></span><span></span>
    </div>
    <div class="chat-input-container">
      <div class="chat-input-wrapper">
        <input type="text" class="chat-input" id="chatInput" placeholder="Escribe tu pregunta..." autocomplete="off">
        <button class="send-btn" id="sendBtn">Enviar</button>
      </div>
      <div class="quick-questions">
        <button class="quick-btn" data-q="¿Cuál es el estado actual de la cartera?">Estado cartera</button>
        <button class="quick-btn" data-q="¿Quiénes son los principales deudores?">Top deudores</button>
        <button class="quick-btn" data-q="¿Cuál es la eficiencia de recaudo?">Eficiencia recaudo</button>
        <button class="quick-btn" data-q="¿Qué riesgos identifica en la cartera?">Riesgos</button>
        <button class="quick-btn" data-q="Analiza la tendencia de facturación vs recaudo">Tendencias</button>
      </div>
    </div>
  </div>

  <script>
    let token = localStorage.getItem('authToken');
    let conversationHistory = [];

    const chatMessages = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');
    const typingIndicator = document.getElementById('typingIndicator');

    // ─── Theme ────────────────────────────────────
    (function() {
      const saved = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', saved);
      const btn = document.getElementById('themeToggle');
      if (btn) btn.textContent = saved === 'dark' ? '☀️ Claro' : '🌙 Oscuro';
    })();
    document.getElementById('themeToggle').addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme') || 'dark';
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      document.getElementById('themeToggle').textContent = next === 'dark' ? '☀️ Claro' : '🌙 Oscuro';
    });

    // ─── Export Handlers ─────────────────────────
    async function exportConversation(format) {
      if (!token || conversationHistory.length === 0) {
        alert('No hay conversación para exportar'); return;
      }
      const btn = document.getElementById('export' + format.charAt(0).toUpperCase() + format.slice(1));
      if (btn) { btn.disabled = true; btn.textContent = '⏳'; }
      try {
        const resp = await fetch('/api/reports/conversation', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify({ format, messages: conversationHistory }),
        });
        if (!resp.ok) {
          const err = await resp.json().catch(() => ({ error: resp.statusText }));
          throw new Error(err.error || resp.statusText);
        }
        const blob = await resp.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `conversacion_${Date.now()}.${format}`; a.click();
        URL.revokeObjectURL(url);
      } catch (err) {
        alert('Error exportando: ' + err.message);
      } finally {
        const labels = { pdf: '📋 PDF', docx: '📝 Word', pptx: '📑 PPT' };
        if (btn) { btn.disabled = false; btn.textContent = labels[format] || format; }
      }
    }

    document.getElementById('exportPdf').addEventListener('click',  () => exportConversation('pdf'));
    document.getElementById('exportDocx').addEventListener('click', () => exportConversation('docx'));
    document.getElementById('exportPptx').addEventListener('click', () => exportConversation('pptx'));

    async function verifyToken() {
      if (!token) return false;
      try {
        const resp = await fetch('/api/verify', { headers: { 'Authorization': 'Bearer ' + token } });
        const data = await resp.json();
        return data.authenticated;
      } catch {
        return false;
      }
    }

    async function init() {
      const authenticated = await verifyToken();
      if (!authenticated) { window.location.href = 'index.html'; return; }
      document.getElementById('userDisplay').textContent = 'naprolab';
      chatInput.focus();
    }

    function addMessage(content, type) {
      const msg = document.createElement('div');
      msg.className = `message ${type}`;
      msg.innerHTML = formatMessage(content);
      chatMessages.appendChild(msg);
      chatMessages.scrollTop = chatMessages.scrollHeight;
      if (typeof renderMathInElement !== 'undefined') {
        renderMathInElement(msg, {
          delimiters: [
            {left: '$$', right: '$$', display: true},
            {left: '\\[', right: '\\]', display: true},
            {left: '$', right: '$', display: false},
            {left: '\\(', right: '\\)', display: false}
          ],
          throwOnError: false
        });
      }
    }

    function formatMessage(text) {
      if (typeof marked !== 'undefined') {
        try {
          return marked.parse(text);
        } catch (e) {
          console.error('Marked parse error:', e);
        }
      }
      return text
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\n/g, '<br>')
        .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
    }

    async function sendMessage(message) {
      if (!message.trim() || !token) return;
      
      addMessage(message, 'user');
      conversationHistory.push({ role: 'user', content: message });
      
      chatInput.value = '';
      sendBtn.disabled = true;
      typingIndicator.style.display = 'block';
      chatMessages.scrollTop = chatMessages.scrollHeight;
      
      try {
        const resp = await fetch('/api/chat', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token
          },
          body: JSON.stringify({
            message,
            conversationHistory
          })
        });
        
        const data = await resp.json();
        
        if (data.success) {
          addMessage(data.response, 'assistant');
          conversationHistory.push({ role: 'assistant', content: data.response });
          if (data.warnings && data.warnings.length > 0) {
            const wEl = document.createElement('div');
            wEl.className = 'warning-badge';
            wEl.textContent = '⚠️ ' + data.warnings[0];
            chatMessages.lastElementChild.appendChild(wEl);
          }
        } else {
          addMessage('Error: ' + (data.error || 'Respuesta inválida'), 'system');
        }
      } catch (err) {
        addMessage('Error de conexión con el servidor', 'system');
      } finally {
        sendBtn.disabled = false;
        typingIndicator.style.display = 'none';
        chatInput.focus();
      }
    }

    sendBtn.addEventListener('click', () => sendMessage(chatInput.value));
    
    chatInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage(chatInput.value);
    });

    document.querySelectorAll('.quick-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        sendMessage(btn.dataset.q);
      });
    });

    init();
  </script>
</body>
</html>
